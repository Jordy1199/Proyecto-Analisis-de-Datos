name: Trigger Favorita Pipeline

on:
  push:
    paths:
      - 'manifest.json'
  workflow_dispatch:

jobs:
  trigger-dag:
    runs-on: ubuntu-latest
    steps:
      - name: Decodificar llave SSH
        run: |
          echo "${{ secrets.VM_SSH_KEY }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Disparar DAG en la VM via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key_path: /tmp/deploy_key
          script: |
            cd ~/Proyecto-Analisis-de-Datos
            source venv/bin/activate
            airflow dags trigger favorita_pipeline
            echo "DAG disparado correctamente"
